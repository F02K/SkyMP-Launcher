name: Build launcher release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate release configuration
        run: npm run validate:release
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require Windows code-signing credentials
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: if (-not $env:CSC_LINK -or -not $env:CSC_KEY_PASSWORD) { throw 'WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD are required for public Windows releases.' }
      - run: npm run build:win -- --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:linux -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-linux
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest-linux.yml

  release:
    if: github.ref_type == 'tag'
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v5
        with:
          pattern: launcher-*
          path: release-assets
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          npm sbom --sbom-format cyclonedx > release-assets/sbom.cdx.json
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cd ..
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
          fi
